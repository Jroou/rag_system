knowledge_base:
  monitored_folder: "./data"
  supported_extensions:
    - ".pdf"
    - ".md"
    - ".py"
    - ".js"
    - ".ts"
    - ".doc"
    - ".docx"

embedding:
  model_name: "multilingual-e5-large"
  device: "cpu"

reranker:
  model_name: "BAAI/bge-reranker-v2-m3"
  device: "cpu"
  top_n: 7

retrieval:
  top_k: 20
  default_strategy: "semantic"

chunking:
  parent_chunk_size: 1000
  child_chunk_size: 200
  chunk_overlap: 50

storage:
  qdrant_path: "./qdrant_data"
  sqlite_path: "./rag_system.db"
  collection_name: "knowledge_base"

llm:
  active_profile: "bedrock"
  profiles:
    bedrock:
      provider: "bedrock"
      model: "eu.anthropic.claude-opus-4-6-v1"
      temperature: 0.3
      region: "eu-north-1"
    anthropic-default:
      provider: "anthropic"
      model: "claude-sonnet-4-20250514"
      temperature: 0.3
      api_key_env: "ANTHROPIC_API_KEY"
    openai-default:
      provider: "openai"
      model: "gpt-4o"
      temperature: 0.3
      api_key_env: "OPENAI_API_KEY"

inactivity_timeout: 30

system_prompt: |
  You are a helpful assistant that answers questions based ONLY on the provided context.
  Never add information, inferences, or claims not directly stated in the context.
  Always cite your sources using inline numbered references like [1], [2].
  If the context doesn't contain enough information to answer, say so clearly.
  Respond in the same language as the user's question.
  Be thorough: cover all relevant details, facts, and terminology found in the context that relate to the question. Do not omit key information for brevity.
  Structure your response with clear markdown: use ## headings for major sections, bullet lists for enumerations, and bold for key terms. Keep headings concise and descriptive of the content below them.
